<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="shortcut icon" href="/logo.svg" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta property="og:locale" content="en_GB" />
    <meta property="og:url" content="https://rd-myportfolio.vercel.app" />
    <meta property="og:title" content="Reuben Dubois" />
    <meta property="og:type" content="image.png" />
    <meta property="og:image" content="/logoFullBlue.png" />
    <meta
      property="og:description"
      content="Full Stack Developer & Designer — make everything your own."
    />

    <title>Reuben Dubois Portfolio</title>
    <script>
      (() => {
        const storedTheme = localStorage.getItem("theme");
        document
          .querySelector(":root")
          .classList.add(storedTheme === "light" || storedTheme === "dark" ? storedTheme : "light");
      })();
    </script>
  </head>
  <body>
    <div id="root" class="jb-mono"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
